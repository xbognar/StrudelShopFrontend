<div class="flex flex-col grow max-md:mt-8">
  <div class="flex overflow-hidden flex-col w-full" [ngClass]="bgColor">
    <img [src]="imageSrc" [alt]="title" class="object-contain w-full aspect-[0.8] bg-stone-100" loading="lazy">
  </div>
  <p class="mt-2 text-sm leading-none text-slate-500 w-[78px]">
    {{ title }}
  </p>
</div>
