<section class="flex overflow-hidden flex-col justify-center items-center px-20 py-24 w-full bg-zinc-50 max-md:px-5 max-md:max-w-full">
  <div class="flex flex-col pb-96 w-full max-w-[1008px] max-md:pb-24 max-md:max-w-full">
    <div class="flex z-10 flex-col items-center w-full max-md:max-w-full">
      <h2 class="text-4xl font-medium text-center text-slate-700 max-md:max-w-full">
        Catalog
      </h2>
      <nav class="flex flex-wrap gap-10 items-end mt-5 w-full text-base leading-none text-black max-md:max-w-full">
        <div class="flex flex-col grow shrink text-center w-[57px]">
          <div>Cakes</div>
          <div class="mt-3 w-full min-h-0 border-2 border-rose-700 border-solid"></div>
        </div>
        <a href="#bread" class="gap-2.5 self-stretch p-2.5">Bread</a>
        <a href="#pastries" class="gap-2.5 self-stretch p-2.5">Pastries</a>
        <a href="#hampers" class="gap-2.5 self-stretch p-2.5">Hampers</a>
      </nav>
      <div class="mt-11 w-full max-md:mt-10">
        <div class="flex gap-5 max-md:flex-col">
          <div class="flex flex-col w-6/12 max-md:ml-0 max-md:w-full">
            <div class="flex flex-col w-full max-md:mt-8 max-md:max-w-full">
              <div *ngFor="let product of products">
                <app-catalog-item [imageSrc]="product.imageUrl"
                                  [title]="product.description"
                                  bgColor="bg-stone-500 bg-opacity-10"></app-catalog-item>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
